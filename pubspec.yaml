name: sshub
description: "SSHub is a fast, minimal SSH client for the desktop. Save your servers, connect with one click, and work in a full terminal. Credentials stay encrypted on your machine."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  uuid: ^4.5.3
  path_provider: ^2.1.5
  flutter_secure_storage: ^10.3.1

  # Ssh connection and in-built terminal
  dartssh2: ^2.17.1
  xterm: ^4.0.0
  
  file_picker: ^10.0.0
  cryptography: ^2.9.0

  # Authentication
  local_auth: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

dependency_overrides:
  xterm:
    path: third_party/xterm

flutter:
  uses-material-design: true

  assets:
    - assets/icon/icon.png

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
