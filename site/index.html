<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/SSHub/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSHub - A fast, minimal SSH client for desktop and mobile</title>
    <meta
      name="description"
      content="SSHub is a fast, minimal SSH client for desktop and mobile. A full terminal, a built-in SFTP file browser, password or key auth, host key verification, and encrypted credentials that stay on your machine."
    />
    <meta property="og:title" content="SSHub" />
    <meta
      property="og:description"
      content="A fast, minimal SSH client with a full terminal and a built-in SFTP file browser. Your servers, one click away."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mdfarhankc.github.io/SSHub/" />
    <meta
      property="og:image"
      content="https://mdfarhankc.github.io/SSHub/logo.png"
    />
    <meta property="og:image:alt" content="SSHub" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="SSHub" />
    <meta
      name="twitter:description"
      content="A fast, minimal SSH client with a full terminal and a built-in SFTP file browser."
    />
    <meta
      name="twitter:image"
      content="https://mdfarhankc.github.io/SSHub/logo.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Set theme before paint to avoid a flash. Dark is the brand default.
      (function () {
        var stored = localStorage.getItem("theme");
        var prefersLight = window.matchMedia(
          "(prefers-color-scheme: light)"
        ).matches;
        var theme = stored || (prefersLight ? "light" : "dark");
        document.documentElement.classList.toggle("dark", theme !== "light");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
