# flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/icon_green_black.png"

  android: "launcher_icon"
  min_sdk_android: 21 # android min sdk min:16, default 21
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/icon_green_fg.png"
  adaptive_icon_foreground_inset: 0
  adaptive_icon_monochrome: "assets/icon/icon_mono_fg.png"

  ios: true
  image_path_ios: "assets/icon/icon_green_black.png"
  remove_alpha_ios: true
  # image_path_ios_dark_transparent: "assets/icon/icon_dark.png"
  image_path_ios_tinted_grayscale: "assets/icon/icon_monochrome.png"
  desaturate_tinted_to_grayscale_ios: true
  # background_color_ios: "#ffffff"

  windows:
    generate: true
    image_path: "assets/icon/icon_green_macos.png"
    icon_size: 256 # min:48, max:256, default: 48

  macos:
    generate: true
    image_path: "assets/icon/icon_green_macos.png"
