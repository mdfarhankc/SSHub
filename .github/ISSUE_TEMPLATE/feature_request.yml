name: Feature request
description: Suggest an idea or improvement for SSHub
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Ideas are welcome. Note that SSHub is not accepting code contributions
        right now, so this is a request, not a pull request.
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that SSHub does not let you do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What you would like
      description: Describe the feature or change you have in mind.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
    validations:
      required: false
