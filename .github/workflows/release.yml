name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.44.0"

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Package
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath sshub-windows-x64.zip
      - uses: softprops/action-gh-release@v2
        with:
          files: sshub-windows-x64.zip

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libsecret-1-dev libjsoncpp-dev
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Package
        run: tar -czf sshub-linux-x64.tar.gz -C build/linux/x64/release/bundle .
      - uses: softprops/action-gh-release@v2
        with:
          files: sshub-linux-x64.tar.gz

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - name: Restore keystore and key.properties
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF
      - run: flutter pub get
      - run: flutter build apk --release
      - name: Rename artifact
        run: mv build/app/outputs/flutter-apk/app-release.apk sshub-android.apk
      - uses: softprops/action-gh-release@v2
        with:
          files: sshub-android.apk

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Package
        run: |
          APP=$(ls -d build/macos/Build/Products/Release/*.app | head -1)
          ditto -c -k --keepParent "$APP" sshub-macos.zip
      - uses: softprops/action-gh-release@v2
        with:
          files: sshub-macos.zip
