name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.44.0"

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Build installer
        run: |
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows\packaging\sshub.iss
      - name: Package portable
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath dist/sshub-windows-x64-portable.zip
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/sshub-windows-setup.exe
            dist/sshub-windows-x64-portable.zip

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libsecret-1-dev libjsoncpp-dev
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Build AppImage
        run: |
          mkdir -p AppDir/usr/bin dist
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/
          cp assets/icon/icon.png AppDir/sshub.png
          printf '%s\n' '[Desktop Entry]' 'Name=SSHub' 'Exec=sshub' 'Icon=sshub' 'Type=Application' 'Categories=Utility;' > AppDir/sshub.desktop
          printf '%s\n' '#!/bin/bash' 'HERE="$(dirname "$(readlink -f "${0}")")"' 'exec "${HERE}/usr/bin/sshub" "$@"' > AppDir/AppRun
          chmod +x AppDir/AppRun
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool-x86_64.AppImage AppDir dist/sshub-linux-x86_64.AppImage
      - name: Package portable
        run: tar -czf dist/sshub-linux-x64.tar.gz -C build/linux/x64/release/bundle .
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/sshub-linux-x86_64.AppImage
            dist/sshub-linux-x64.tar.gz

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - name: Restore keystore and key.properties
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF
      - run: flutter pub get
      - run: flutter build apk --release
      - name: Rename artifact
        run: mv build/app/outputs/flutter-apk/app-release.apk sshub-android.apk
      - uses: softprops/action-gh-release@v2
        with:
          files: sshub-android.apk

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Build dmg
        run: |
          APP=$(ls -d build/macos/Build/Products/Release/*.app | head -1)
          mkdir -p dmg dist
          cp -R "$APP" dmg/
          ln -s /Applications dmg/Applications
          hdiutil create -volname "SSHub" -srcfolder dmg -ov -format UDZO dist/sshub-macos.dmg
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/sshub-macos.dmg
